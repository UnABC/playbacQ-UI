<div class="player-container">
  <div class="video-wrapper">
    <video #videoElement controls crossorigin="anonymous" class="video-element"></video>

    <div *ngIf="isLoading" class="spinner-overlay">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  </div>

  <mat-card *ngIf="videoMetadata" class="metadata-card">
    <mat-card-header>
      <mat-card-title class="video-title">{{ videoMetadata.title }}</mat-card-title>
      <mat-card-subtitle class="video-stats">
        再生回数: {{ videoMetadata.view_count }}回 • {{ videoMetadata.created_at | date:'yyyy/MM/dd HH:mm' }}
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-divider class="divider"></mat-divider>
      <p class="description" [innerHTML]="videoMetadata.description | linkify">{{ videoMetadata.description }}</p>
    </mat-card-content>
  </mat-card>
</div>
