<div class="app-container">
	<div class="toolbar">
		<h1 class="app-title">playbacQ</h1>
		<div class="search-bar">
			<input #searchInput type="text" placeholder="動画を検索..." (keyup.enter)="onSearch(searchInput.value)">
			<button mat-icon-button (click)="onSearch(searchInput.value)">
				<mat-icon>search</mat-icon>
			</button>
		</div>
		<button mat-flat-button color="primary" (click)="openUploadDialog()">
			<mat-icon>upload</mat-icon> 動画を投稿
		</button>
	</div>
	<router-outlet></router-outlet>
</div>
